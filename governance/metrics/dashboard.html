<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Molehill Metrics</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #20242c;
      --muted: #667085;
      --line: #d9dee8;
      --accent: #276749;
      --accent-soft: #dff3e7;
      --warn: #9a4f12;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
    }

    header,
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
    }

    header {
      padding: 28px 0 16px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .toolbar,
    .summary,
    .data-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      padding: 14px;
      margin-bottom: 16px;
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    select,
    input,
    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
      padding: 6px 10px;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .metric {
      min-width: 0;
      padding: 14px;
      border-right: 1px solid var(--line);
    }

    .metric:last-child {
      border-right: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 24px;
      line-height: 1.2;
    }

    .data-panel {
      padding: 14px;
      margin-bottom: 28px;
    }

    .status {
      min-height: 20px;
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .status.warning {
      color: var(--warn);
    }

    .chart {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(96px, 144px) 1fr minmax(44px, max-content);
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }

    .bar-track {
      height: 20px;
      background: #edf0f5;
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      min-width: 2px;
      background: var(--accent);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 9px 8px;
      border-top: 1px solid var(--line);
      text-align: left;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    @media (max-width: 760px) {
      header,
      main {
        width: min(100vw - 20px, 1120px);
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .bar-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Molehill Metrics</h1>
    <p class="subtitle">Processed inbox item counts from local metrics files.</p>
  </header>

  <main>
    <section class="toolbar" aria-label="Dashboard controls">
      <label>
        View
        <select id="viewSelect">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
      </label>
      <label>
        From
        <input id="fromDate" type="date">
      </label>
      <label>
        To
        <input id="toDate" type="date">
      </label>
      <label>
        Load JSON files
        <input id="fileInput" type="file" accept="application/json,.json" multiple>
      </label>
      <button id="reloadButton" type="button">Reload</button>
    </section>

    <section class="summary" aria-label="Summary metrics">
      <div class="metric"><span>Total</span><strong id="totalCount">0</strong></div>
      <div class="metric"><span>Average</span><strong id="averageCount">0</strong></div>
      <div class="metric"><span>Latest Day</span><strong id="latestDay">0</strong></div>
      <div class="metric"><span>Latest Week</span><strong id="latestWeek">0</strong></div>
      <div class="metric"><span>Latest Month</span><strong id="latestMonth">0</strong></div>
    </section>

    <section class="data-panel">
      <p id="status" class="status">Loading local metrics files.</p>
      <div id="chart" class="chart" aria-label="Metrics bar chart"></div>
      <table>
        <thead>
          <tr>
            <th id="periodHeader">Period</th>
            <th>Count</th>
          </tr>
        </thead>
        <tbody id="recordsBody"></tbody>
      </table>
    </section>
  </main>

  <script>
    const FILES = {
      daily: 'daily.json',
      weekly: 'weekly.json',
      monthly: 'monthly.json'
    };

    const state = {
      daily: [],
      weekly: [],
      monthly: []
    };

    const viewSelect = document.getElementById('viewSelect');
    const fromDate = document.getElementById('fromDate');
    const toDate = document.getElementById('toDate');
    const fileInput = document.getElementById('fileInput');
    const reloadButton = document.getElementById('reloadButton');
    const statusEl = document.getElementById('status');
    const chartEl = document.getElementById('chart');
    const recordsBody = document.getElementById('recordsBody');
    const periodHeader = document.getElementById('periodHeader');

    function periodStart(record, view) {
      if (view === 'daily') return record.date;
      if (view === 'weekly') return record.week_start;
      return record.month_start;
    }

    function periodLabel(record, view) {
      if (view === 'daily') return record.date;
      if (view === 'weekly') return `${record.week_start} to ${record.week_end}`;
      return record.month;
    }

    function setStatus(message, warning = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('warning', warning);
    }

    function latestCount(records) {
      return Number(records.at(-1)?.count || 0);
    }

    function filteredRecords() {
      const view = viewSelect.value;
      const from = fromDate.value;
      const to = toDate.value;

      return state[view].filter((record) => {
        const start = periodStart(record, view);
        return (!from || start >= from) && (!to || start <= to);
      });
    }

    function render() {
      const view = viewSelect.value;
      const records = filteredRecords();
      const total = records.reduce((sum, record) => sum + Number(record.count || 0), 0);
      const average = records.length ? total / records.length : 0;
      const max = Math.max(1, ...records.map((record) => Number(record.count || 0)));

      document.getElementById('totalCount').textContent = String(total);
      document.getElementById('averageCount').textContent = average.toFixed(1).replace(/\.0$/, '');
      document.getElementById('latestDay').textContent = String(latestCount(state.daily));
      document.getElementById('latestWeek').textContent = String(latestCount(state.weekly));
      document.getElementById('latestMonth').textContent = String(latestCount(state.monthly));
      periodHeader.textContent = view === 'daily' ? 'Date' : 'Period';

      chartEl.replaceChildren(...records.map((record) => {
        const row = document.createElement('div');
        const label = document.createElement('span');
        const track = document.createElement('div');
        const fill = document.createElement('div');
        const value = document.createElement('strong');
        const count = Number(record.count || 0);

        row.className = 'bar-row';
        label.textContent = periodLabel(record, view);
        track.className = 'bar-track';
        fill.className = 'bar-fill';
        fill.style.width = `${Math.max(2, (count / max) * 100)}%`;
        value.textContent = String(count);

        track.append(fill);
        row.append(label, track, value);
        return row;
      }));

      recordsBody.replaceChildren(...records.map((record) => {
        const row = document.createElement('tr');
        const period = document.createElement('td');
        const count = document.createElement('td');

        period.textContent = periodLabel(record, view);
        count.textContent = String(Number(record.count || 0));
        row.append(period, count);
        return row;
      }));

      const latest = records.at(-1);
      setStatus(latest
        ? `Showing ${records.length} ${view} records. Latest selected period: ${periodLabel(latest, view)}.`
        : `No ${view} records match the selected range.`);
    }

    async function loadJsonFile(name) {
      const response = await fetch(name, { cache: 'no-store' });
      if (!response.ok) throw new Error(`${name} returned ${response.status}`);
      return response.json();
    }

    async function loadMetrics() {
      try {
        const [daily, weekly, monthly] = await Promise.all([
          loadJsonFile(FILES.daily),
          loadJsonFile(FILES.weekly),
          loadJsonFile(FILES.monthly)
        ]);

        state.daily = daily.records || [];
        state.weekly = weekly.records || [];
        state.monthly = monthly.records || [];
        render();
      } catch (err) {
        setStatus(`Could not load JSON automatically. Use Load JSON files to select daily.json, weekly.json, and monthly.json. ${err.message}`, true);
        render();
      }
    }

    async function loadSelectedFiles(files) {
      const byName = new Map([...files].map((file) => [file.name, file]));

      for (const [view, name] of Object.entries(FILES)) {
        const file = byName.get(name);
        if (!file) continue;
        const content = JSON.parse(await file.text());
        state[view] = content.records || [];
      }

      render();
    }

    viewSelect.addEventListener('change', render);
    fromDate.addEventListener('change', render);
    toDate.addEventListener('change', render);
    reloadButton.addEventListener('click', loadMetrics);
    fileInput.addEventListener('change', (event) => loadSelectedFiles(event.target.files));

    loadMetrics();
  </script>
</body>
</html>
